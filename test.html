*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf7f2;
  --cream2:#f2ede4;
  --cream3:#e5ddd0;
  --brown:#2c2318;
  --brown2:#4a3d2e;
  --brown3:#7a6a57;
  --tan:#c4a882;
  --tan2:#ddc9ae;
  --teal:#1a8f69;
  --teal2:#e8f5ef;
  --rust:#c4522a;
  --rust2:#fbeee8;
  --gold:#b8860b;
  --gold2:#fdf3d8;
  --ink:#1a1714;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);line-height:1.6;font-size:15px}

/* ── MASTHEAD ── */
.masthead{
  border-bottom:3px solid var(--brown);
  padding:0 3rem;
  display:flex;align-items:stretch;justify-content:space-between;
  background:var(--cream);
  position:sticky;top:0;z-index:200;
}
.mast-left{display:flex;align-items:center;gap:16px;padding:12px 0}
.mast-logo{height:38px}
.mast-divider{width:1px;background:var(--cream3);height:30px}
.mast-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--brown);letter-spacing:-0.01em}
.mast-right{display:flex;align-items:center;gap:0;border-left:1px solid var(--cream3)}
.mast-meta{padding:0 1.25rem;border-right:1px solid var(--cream3);text-align:center;display:flex;flex-direction:column;justify-content:center}
.mast-meta-n{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--brown);line-height:1}
.mast-meta-l{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--brown3);margin-top:2px}
.mast-btn{padding:0 1.25rem;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--brown3);background:none;border:none;cursor:pointer;transition:color 0.2s;height:100%}
.mast-btn:hover{color:var(--teal)}

/* ── COVER ── */
.cover{
  min-height:92vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  border-bottom:2px solid var(--brown);
}
.cover-left{
  background:var(--brown);
  padding:4rem 3.5rem;
  display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
.cover-left::after{
  content:'';position:absolute;bottom:-60px;right:-60px;
  width:280px;height:280px;border-radius:50%;
  background:rgba(196,168,130,0.08);
}
.cover-eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--tan);margin-bottom:2.5rem}
.cover-headline{font-family:'DM Serif Display',serif;font-size:clamp(3rem,5vw,5rem);color:var(--cream);line-height:1.05;letter-spacing:-0.02em;flex:1;display:flex;align-items:center}
.cover-headline em{display:block;color:var(--tan);font-style:italic}
.cover-foot{border-top:1px solid rgba(255,255,255,0.1);padding-top:2rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem}
